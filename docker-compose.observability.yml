# Opt-in observability stack. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Sets Grafana admin password (no anonymous access).
# Exposes Grafana on port 3000 for local browser access.
# Prometheus scrapes /metrics from re_os_agents every 15s.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: re_os_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: re_os_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/grafana_dashboard.json
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
