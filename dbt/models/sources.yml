version: 2

sources:
  - name: re_os
    database: re_os
    schema: public
    loader: scraper
    description: "RE_OS PostgreSQL database — populated by scraper pipelines on schedule."

    freshness:
      warn_after: { count: 24, period: hour }
      error_after: { count: 72, period: hour }

    tables:
      - name: micro_markets
        description: "Geographic market definitions (Yelahanka, Devanahalli, Hebbal, etc.)"
        loaded_at_field: last_scraped_at

      - name: rera_projects
        description: "RERA-registered projects — primary project fact table"
        loaded_at_field: last_scraped_at
        freshness: null  # some markets may never have been scraped

      - name: developers
        description: "Developer/promoter registry from RERA Karnataka"
        loaded_at_field: updated_at
        freshness: null

      - name: listings
        description: "Portal listings (99acres, MagicBricks, Housing, NoBroker)"
        loaded_at_field: last_seen_at

      - name: kaveri_registrations
        description: "Kaveri property registration transactions"
        loaded_at_field: transaction_date
        freshness: null

      - name: igr_transactions
        description: "IGR Karnataka sale deed transactions"
        loaded_at_field: registration_date
        freshness: null
