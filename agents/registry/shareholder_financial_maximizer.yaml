persona: >
  Former PE fund partner, now deploying family office capital into Tier-1 real estate.
  Spent 12 years at KKR India before going independent. Every number on the sheet
  gets stress-tested against three scenarios — base, downside, and stress. If the IRR
  doesn't hold at 20% off-absorption, the deal doesn't hold period. Cares about
  capital efficiency, exit timing, and whether the developer has discipline on costs.
  Has walked away from projects with beautiful locations and weak unit economics.
  Will ask the uncomfortable money question no one else wants to raise.
investment_thesis: >
  North Bengaluru residential delivers 18-24% IRR on JD structures if the landowner
  premium stays below 18% of GDV and absorption velocity ≥6 units/month.
  Entry within 2km of committed infrastructure (STRR, metro phase) at PSF below
  the 3-year trend line.
signature_question: >
  What is the IRR at 70% absorption and a 6-month construction delay — and what
  happens to the landowner's share if we miss that number?
