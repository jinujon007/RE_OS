# RE_OS — Real Estate Intelligence OS
# Multi-agent system: PostgreSQL+PostGIS | Ollama | Redis | Agent Crew
# Boot: docker compose up -d

services:

  # ── DATABASE ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: re_os_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: re_os
      POSTGRES_USER: re_os_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    # Port intentionally not published — access via: docker compose exec postgres psql -U re_os_user -d re_os
    # Or: make db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U re_os_user -d re_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LOCAL LLM ENGINE ──────────────────────────────────────────────────────
  # Powers: Parser Agent, Organizer Agent, Analyst Agent (free, local)
  ollama:
    image: ollama/ollama:latest
    container_name: re_os_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Port not published — agents communicate via internal Docker network (http://ollama:11434)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── TASK QUEUE ────────────────────────────────────────────────────────────
  # Agents communicate via Redis — CEO pushes tasks, workers consume
  redis:
    image: redis:7-alpine
    container_name: re_os_redis
    restart: unless-stopped
    # Port not published — agents communicate via internal Docker network (redis://redis:6379)
    # Used by: Flask-Limiter rate limiting (agents), APScheduler job store (scheduler)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── AGENT CREW ────────────────────────────────────────────────────────────
  # The multi-agent team: CEO + Scraper + Parser + Organizer + Analyst
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: re_os_agents
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://re_os_user:${DB_PASSWORD}@postgres:5432/re_os
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
      # API Keys from .env — Docker Compose picks these up automatically
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-gpt-oss-120b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TARGET_MARKETS: ${TARGET_MARKETS:-Yelahanka,Devanahalli,Hebbal}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      DASHBOARD_API_KEY_PREV: ${DASHBOARD_API_KEY_PREV:-}
      DASHBOARD_ALLOWED_ORIGINS: ${DASHBOARD_ALLOWED_ORIGINS:-http://localhost:8050}
      DISCORD_WEBHOOK_RERA_YELAHANKA: ${DISCORD_WEBHOOK_RERA_YELAHANKA:-}
      DISCORD_WEBHOOK_RERA_DEVANAHALLI: ${DISCORD_WEBHOOK_RERA_DEVANAHALLI:-}
      DISCORD_WEBHOOK_RERA_HEBBAL: ${DISCORD_WEBHOOK_RERA_HEBBAL:-}
      DISCORD_WEBHOOK_COMPETITOR: ${DISCORD_WEBHOOK_COMPETITOR:-}
      DISCORD_WEBHOOK_PRICE: ${DISCORD_WEBHOOK_PRICE:-}
      DISCORD_WEBHOOK_INTEL: ${DISCORD_WEBHOOK_INTEL:-}
      DISCORD_WEBHOOK_SYSTEM: ${DISCORD_WEBHOOK_SYSTEM:-}
      # ── HuggingFace / Jina / SambaNova / Cloudflare (zero-cost providers) ──
      SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY:-}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
      CHROMA_DB_PATH: /app/data/chroma
    ports:
      - "8050:8050"
    volumes:
      - ./:/app
      - re_os_outputs:/app/outputs
      - re_os_logs:/app/logs
      - hf_cache:/root/.cache/huggingface
      - chroma_data:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050/api/health', timeout=5)\" 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    command:
      - sh
      - -c
      - alembic upgrade head && python -c "from agents.agent_factory import sync_registry_to_db; sync_registry_to_db()" && exec gunicorn dashboard.app:app --bind 0.0.0.0:8050 --workers 1 --threads 8 --timeout 120 --max-requests 500 --max-requests-jitter 50 --access-logfile - --error-logfile -

  # ── SCHEDULER ─────────────────────────────────────────────────────────────
  # Runs scraping jobs on schedule — daily RERA refresh, hourly listing scan
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: re_os_scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://re_os_user:${DB_PASSWORD}@postgres:5432/re_os
      OLLAMA_BASE_URL: http://ollama:11434
      REDIS_URL: redis://redis:6379
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      CEREBRAS_MODEL: ${CEREBRAS_MODEL:-gpt-oss-120b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TARGET_MARKETS: ${TARGET_MARKETS:-Yelahanka,Devanahalli,Hebbal}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      DASHBOARD_API_KEY_PREV: ${DASHBOARD_API_KEY_PREV:-}
      DISCORD_WEBHOOK_RERA_YELAHANKA: ${DISCORD_WEBHOOK_RERA_YELAHANKA:-}
      DISCORD_WEBHOOK_RERA_DEVANAHALLI: ${DISCORD_WEBHOOK_RERA_DEVANAHALLI:-}
      DISCORD_WEBHOOK_RERA_HEBBAL: ${DISCORD_WEBHOOK_RERA_HEBBAL:-}
      DISCORD_WEBHOOK_COMPETITOR: ${DISCORD_WEBHOOK_COMPETITOR:-}
      DISCORD_WEBHOOK_PRICE: ${DISCORD_WEBHOOK_PRICE:-}
      DISCORD_WEBHOOK_INTEL: ${DISCORD_WEBHOOK_INTEL:-}
      DISCORD_WEBHOOK_SYSTEM: ${DISCORD_WEBHOOK_SYSTEM:-}
      # ── HuggingFace / Jina / SambaNova / Cloudflare (zero-cost providers) ──
      SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY:-}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      HF_API_KEY: ${HF_API_KEY:-}
      CHROMA_DB_PATH: /app/data/chroma
    volumes:
      - ./:/app
      - re_os_outputs:/app/outputs
      - re_os_logs:/app/logs
      - hf_cache:/root/.cache/huggingface
      - chroma_data:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python config/scheduler.py' > /dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: python config/scheduler.py

volumes:
  postgres_data:
  ollama_data:
  redis_data:
  re_os_outputs:
  re_os_logs:
  hf_cache:
  chroma_data: