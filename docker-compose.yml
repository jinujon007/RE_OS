# RE_OS — Real Estate Intelligence OS
# Multi-agent system: PostgreSQL+PostGIS | Ollama | Redis | Agent Crew
# Boot: docker compose up -d

# ── SHARED ENVIRONMENT (applied to both agents + scheduler) ───────────────────
x-agent-env: &agent-env
  DATABASE_URL: postgresql://re_os_user:${DB_PASSWORD}@postgres:5432/re_os
  OLLAMA_BASE_URL: http://ollama:11434
  REDIS_URL: redis://redis:6379
  CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
  CEREBRAS_MODEL: ${CEREBRAS_MODEL:-gpt-oss-120b}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  TARGET_MARKETS: ${TARGET_MARKETS:-Yelahanka,Devanahalli,Hebbal}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
  DASHBOARD_API_KEY_PREV: ${DASHBOARD_API_KEY_PREV:-}
  DASHBOARD_ALLOWED_ORIGINS: ${DASHBOARD_ALLOWED_ORIGINS:-http://localhost:8050}
  DISCORD_WEBHOOK_RERA_YELAHANKA: ${DISCORD_WEBHOOK_RERA_YELAHANKA:-}
  DISCORD_WEBHOOK_RERA_DEVANAHALLI: ${DISCORD_WEBHOOK_RERA_DEVANAHALLI:-}
  DISCORD_WEBHOOK_RERA_HEBBAL: ${DISCORD_WEBHOOK_RERA_HEBBAL:-}
  DISCORD_WEBHOOK_COMPETITOR: ${DISCORD_WEBHOOK_COMPETITOR:-}
  DISCORD_WEBHOOK_PRICE: ${DISCORD_WEBHOOK_PRICE:-}
  DISCORD_WEBHOOK_INTEL: ${DISCORD_WEBHOOK_INTEL:-}
  DISCORD_WEBHOOK_SYSTEM: ${DISCORD_WEBHOOK_SYSTEM:-}
  SAMBANOVA_API_KEY: ${SAMBANOVA_API_KEY:-}
  CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:-}
  CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
  JINA_API_KEY: ${JINA_API_KEY:-}
  HF_API_KEY: ${HF_API_KEY:-}
  CHROMA_DB_PATH: /app/data/chroma

# ── SHARED VOLUMES (applied to both agents + scheduler) ───────────────────────
x-agent-volumes: &agent-volumes
  - ./:/app
  - re_os_outputs:/app/outputs
  - re_os_logs:/app/logs
  - hf_cache:/root/.cache/huggingface
  - chroma_data:/app/data/chroma

services:

  # ── DATABASE ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: re_os_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: re_os
      POSTGRES_USER: re_os_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    # Port intentionally not published — access via: docker compose exec postgres psql -U re_os_user -d re_os
    # Or: make db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U re_os_user -d re_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LOCAL LLM ENGINE ──────────────────────────────────────────────────────
  # Powers: Parser Agent, Organizer Agent, Analyst Agent (free, local)
  ollama:
    image: ollama/ollama:latest
    container_name: re_os_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      - ./models:/app/models:ro
    # Port not published — agents communicate via internal Docker network (http://ollama:11434)
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── TASK QUEUE ────────────────────────────────────────────────────────────
  # Agents communicate via Redis — CEO pushes tasks, workers consume
  redis:
    image: redis:7-alpine
    container_name: re_os_redis
    restart: unless-stopped
    # Port not published — agents communicate via internal Docker network (redis://redis:6379)
    # Used by: Flask-Limiter rate limiting (agents), APScheduler job store (scheduler)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── AGENT CREW ────────────────────────────────────────────────────────────
  # The multi-agent team: CEO + Scraper + Parser + Organizer + Analyst
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: re_os_agents
    restart: unless-stopped
    environment:
      <<: *agent-env
    ports:
      - "8050:8050"
    volumes: *agent-volumes
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050/api/health/live', timeout=5)\" 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    command:
      - sh
      - -c
      - alembic upgrade head && python -c "from agents.agent_factory import sync_registry_to_db; sync_registry_to_db()" && exec uvicorn dashboard.app_fastapi:app --host 0.0.0.0 --port 8050 --workers 1 --log-level info

  # ── SCHEDULER ─────────────────────────────────────────────────────────────
  # Runs scraping jobs on schedule — daily RERA refresh, hourly listing scan
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: re_os_scheduler
    restart: unless-stopped
    environment:
      <<: *agent-env
    volumes: *agent-volumes
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,sys; procs=[open(f'/proc/{p}/cmdline').read() for p in os.listdir('/proc') if p.isdigit() and os.path.exists(f'/proc/{p}/cmdline')]; sys.exit(0 if any('scheduler.py' in p for p in procs) else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: python config/scheduler.py

  # ── PROMETHEUS ──────────────────────────────────────────────────────────
  # Scrapes /metrics from re_os_agents every 15s. Internal only.
  # Uncomment ports below for local debugging (Prometheus UI at localhost:9090).
  prometheus:
    image: prom/prometheus:latest
    container_name: re_os_prometheus
    restart: unless-stopped
    # ports:
    #   - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      agents:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── GRAFANA ─────────────────────────────────────────────────────────────
  # Pre-configured with Prometheus datasource. Anonymous Admin access.
  grafana:
    image: grafana/grafana:latest
    container_name: re_os_grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/grafana_dashboard.json
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  ollama_data:
  redis_data:
  re_os_outputs:
  re_os_logs:
  hf_cache:
  chroma_data:
  prometheus_data:
  grafana_data: