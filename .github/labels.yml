# GitHub Labels — RE_OS
# Sync with: gh label create --force (see GOVERNANCE.md for sync command)

# Priority
- name: "P0-critical"
  color: "d73a4a"
  description: "Production-breaking. Fix before anything else."

- name: "P1-high"
  color: "e4e669"
  description: "High impact. Target: next deploy."

- name: "P2-medium"
  color: "ffd33d"
  description: "Medium impact. Target: this sprint."

- name: "P3-low"
  color: "e4e4e4"
  description: "Low impact. Backlog."

# Type
- name: "bug"
  color: "d73a4a"
  description: "Something is broken."

- name: "enhancement"
  color: "a2eeef"
  description: "New capability or improvement."

- name: "documentation"
  color: "0075ca"
  description: "Documentation only change."

- name: "security"
  color: "b60205"
  description: "Security vulnerability or hardening."

- name: "good-first-issue"
  color: "7057ff"
  description: "Good entry point for new contributors."

# Process
- name: "stale"
  color: "cfd3d7"
  description: "No activity for 30+ days."

- name: "pinned"
  color: "e4e669"
  description: "Do not auto-close this issue."

- name: "blocked"
  color: "b60205"
  description: "Blocked on external dependency."

- name: "in-progress"
  color: "1d76db"
  description: "Actively being worked on."

- name: "needs-triage"
  color: "e4e669"
  description: "Awaiting classification."

