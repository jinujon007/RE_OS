- name: "agent"
  color: "5319e7"
  description: "CEO, Analyst, Scraper, or Sentinel agent."

- name: "scraper"
  color: "0e8a16"
  description: "RERA, listings, Kaveri, or scout scrapers."

- name: "database"
  color: "0075ca"
  description: "Schema, migrations, views, or DB organizer."

- name: "pipeline"
  color: "006b75"
  description: "3-stage pipeline orchestration."

- name: "llm-router"
  color: "8b45b5"
  description: "LLM routing, fallback chains, API keys."

- name: "ci/cd"
  color: "0e8a16"
  description: "GitHub Actions, Docker, CI configuration."

- name: "dependencies"
  color: "0366d6"
  description: "Dependency update (Dependabot)."

