name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.11.12

      - name: Lint with ruff
        run: ruff check .

      - name: Check Python syntax (all source files)
        run: |
          find . -name "*.py" \
            -not -path "./.kilo/*" \
            -not -path "./kilo_output/*" \
            -not -path "./kilo_logs/*" \
            -not -path "./.pytest_cache/*" \
            -not -path "./node_modules/*" \
            | xargs python -m py_compile

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install pytest>=7.0 pytest-mock>=3.0 loguru python-dotenv

      - name: Run unit tests
        env:
          DB_PASSWORD: test_password_for_ci
        run: pytest tests/ -v --tb=short

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create stub .env from example
        run: |
          cp .env.example .env
          sed -i 's/gsk_your-key-here/gsk_stubkey/' .env
          sed -i 's/nvapi-your-key-here/nvapi_stubkey/' .env
          sed -i 's/sk-or-v1-your-key-here/sk-or-v1-stubkey/' .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  schema-check:
    name: SQL Schema Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: re_os_test
          POSTGRES_USER: re_os_user
          POSTGRES_PASSWORD: re_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U re_os_user -d re_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Apply schema to test database
        env:
          PGPASSWORD: re_os_test
        run: |
          psql -h localhost -U re_os_user -d re_os_test -f database/schema.sql
          echo "Schema applied successfully"
