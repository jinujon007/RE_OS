name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.11.12

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Check Python syntax (all source files)
        run: |
          find . -name "*.py" \
            -not -path "./.kilo/*" \
            -not -path "./kilo_output/*" \
            -not -path "./kilo_logs/*" \
            -not -path "./.pytest_cache/*" \
            -not -path "./node_modules/*" \
            | xargs python -m py_compile

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: pip install pytest>=7.0 pytest-mock>=3.0 pytest-cov>=4.0 loguru python-dotenv flask psycopg2-binary sqlalchemy

      - name: Run unit tests
        env:
          DB_PASSWORD: test_password_for_ci
        run: pytest tests/ -v --tb=short --cov=agents --cov=config --cov=crews --cov=scrapers --cov=utils --cov=dashboard --cov-report=term-missing --cov-fail-under=40

  pip-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create stub .env from example
        run: |
          cp .env.example .env
          sed -i 's/your_secure_db_password_here/ci_stub_password/' .env
          sed -i 's/csk_your-key-here/csk_stubkey/' .env
          sed -i 's/gsk_your-key-here/gsk_stubkey/' .env
          sed -i 's/AIza_your-key-here/AIza_stubkey/' .env
          sed -i 's/nvapi-your-key-here/nvapi_stubkey/' .env
          sed -i 's/sk-or-v1-your-key-here/sk-or-v1-stubkey/' .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build Docker image
        run: docker build . --tag re_os:ci --quiet

  schema-check:
    name: SQL Schema Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: re_os_test
          POSTGRES_USER: re_os_user
          POSTGRES_PASSWORD: re_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U re_os_user -d re_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Apply schema to test database
        env:
          PGPASSWORD: re_os_test
        run: |
          psql -h localhost -U re_os_user -d re_os_test -f database/schema.sql
          echo "Schema applied successfully"
