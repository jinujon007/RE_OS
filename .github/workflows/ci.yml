name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.11.12

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Check Python syntax (all source files)
        run: |
          find . -name "*.py" \
            -not -path "./.kilo/*" \
            -not -path "./kilo_output/*" \
            -not -path "./kilo_logs/*" \
            -not -path "./.pytest_cache/*" \
            -not -path "./node_modules/*" \
            | xargs python -m py_compile

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install \
            pytest>=7.0 pytest-mock>=3.0 pytest-cov>=4.0 \
            loguru python-dotenv \
            psycopg2-binary sqlalchemy alembic \
            "prometheus-client>=0.21.0" \
            redis requests \
            fastapi starlette httpx pandas geoalchemy2 shapely jinja2 tenacity

      - name: Run unit tests
        env:
          DB_PASSWORD: test_password_for_ci
        run: pytest tests/ -v -m "not integration" --tb=short --cov=agents --cov=config --cov=crews --cov=scrapers --cov=utils --cov=dashboard --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Sprint 50 — HF Intelligence CI gate (finbert-tone + LegalDocQA)
        run: |
          echo "Running finbert-tone + LegalDocQA unit tests (mocked, no HF API)"
          python -m pytest tests/test_finbert_tone.py tests/test_legal_doc_qa.py tests/test_gate58.py -m "not integration" -v --tb=short

      - name: BERTScore regression check
        continue-on-error: true
        run: |
          if ! command -v bc &>/dev/null; then
            echo "bc not available — installing"
            sudo apt-get update -qq && sudo apt-get install -y -qq bc
          fi
          FILE="outputs/eval_scores.jsonl"
          if [ ! -f "$FILE" ]; then
            echo "No eval_scores.jsonl found — skipping regression check"
            exit 0
          fi
          COUNT=$(wc -l < "$FILE")
          if [ "$COUNT" -lt 2 ]; then
            echo "Only $COUNT entry found — need >=2 for regression check"
            exit 0
          fi
          LATEST=$(tail -1 "$FILE" | grep -o '"score": [0-9.]*' | head -1 | awk '{print $2}')
          PREV=$(tail -2 "$FILE" | head -1 | grep -o '"score": [0-9.]*' | head -1 | awk '{print $2}')
          if [ -z "$LATEST" ] || [ -z "$PREV" ]; then
            echo "Could not extract scores from eval_scores.jsonl"
            exit 0
          fi
          THRESHOLD=$(echo "$PREV - 0.05" | bc)
          if [ "$(echo "$LATEST >= $THRESHOLD" | bc)" -eq 1 ]; then
            echo "BERTScore OK: latest=$LATEST >= threshold=$THRESHOLD (previous=$PREV - 0.05)"
            exit 0
          else
            echo "BERTScore regression: latest=$LATEST < threshold=$THRESHOLD (previous=$PREV - 0.05)"
            exit 1
          fi

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: detect-secrets scan
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

  sast:
    name: Static Security Analysis (Bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        # -ll = medium severity and above, -ii = medium confidence and above
        # Excludes test files (assertions and subprocess use is intentional)
        # Excludes .kilo worktrees and kilo output directories
        run: |
          bandit -r . -ll -ii \
            --exclude ./.kilo,./kilo_output,./kilo_logs,./tests,./scripts \
            -f text

  pip-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt

  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create stub .env from example
        run: |
          cp .env.example .env
          sed -i 's/your_secure_db_password_here/ci_stub_password/' .env
          sed -i 's/csk_your-key-here/csk_stubkey/' .env
          sed -i 's/gsk_your-key-here/gsk_stubkey/' .env
          sed -i 's/AIza_your-key-here/AIza_stubkey/' .env
          sed -i 's/nvapi-your-key-here/nvapi_stubkey/' .env
          sed -i 's/sk-or-v1-your-key-here/sk-or-v1-stubkey/' .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build Docker image
        run: docker build . --tag re_os:ci --quiet

  schema-check:
    name: SQL Schema Syntax
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: re_os_test
          POSTGRES_USER: re_os_user
          POSTGRES_PASSWORD: re_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U re_os_user -d re_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Apply schema to test database
        env:
          PGPASSWORD: re_os_test
        run: |
          psql -h localhost -U re_os_user -d re_os_test -f database/schema.sql
          echo "Schema applied successfully"

      - name: Alembic migration drift check
        env:
          DB_PASSWORD: re_os_test
          DATABASE_URL: postgresql://re_os_user:re_os_test@localhost:5432/re_os_test
        run: |
          pip install alembic>=1.13.0 psycopg2-binary sqlalchemy geoalchemy2
          # schema.sql was already applied above — stamp head so Alembic
          # knows the DB is at the latest revision without re-running migrations
          alembic stamp head
          echo "Schema stamped at head"
          # Check no pending migrations (no drift between schema.sql and Alembic head)
          alembic check
          echo "Alembic check passed — no drift detected"
          # Verify single head (no branch divergence)
          HEADS=$(alembic heads | wc -l)
          if [ "$HEADS" -ne 1 ]; then
            echo "FAIL: Expected 1 alembic head, got $HEADS"
            alembic heads
            exit 1
          fi
          echo "Single alembic head confirmed"

  integrity-tests:
    name: DB Integrity Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: schema-check

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: re_os_test
          POSTGRES_USER: re_os_user
          POSTGRES_PASSWORD: re_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U re_os_user -d re_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install psql + test deps
        run: |
          sudo apt-get install -y postgresql-client
          pip install pytest>=7.0 loguru python-dotenv \
            psycopg2-binary sqlalchemy alembic \
            geoalchemy2 prometheus-client redis requests

      - name: Apply schema + run migrations
        env:
          PGPASSWORD: re_os_test
          DB_PASSWORD: re_os_test
          DATABASE_URL: postgresql://re_os_user:re_os_test@localhost:5432/re_os_test
        run: |
          psql -h localhost -U re_os_user -d re_os_test -f database/schema.sql
          alembic upgrade head

      - name: Run data integrity checks
        env:
          DB_PASSWORD: re_os_test
        run: |
          pytest tests/test_data_integrity.py -m integration -v --tb=short

  repo-hygiene:
    name: Dev-file Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no dev-only files in tracked tree
        run: |
          BLOCKED=(
            CLAUDE.md BRAIN_BRIEF.md AGENTS.md
            TASK_QUEUE.md TASK_BRIEFS.md TASK_ARCHIVE.md TODOS.md
            CURRENT_TASK.md DISPATCH.md GOVERNANCE.md REPLAN.md
            STRATEGY.md SUPPORT.md NEXT_TASKS.md BEGINNER_GUIDE.md
            .kilocoderules .clinerules
            KILO_BRIEF.md CLINE_BRIEF.md TOOL_GUIDE.md DEVLOG.md OPERATIONAL_REVIEW.md
          )
          FAILED=0
          for f in "${BLOCKED[@]}"; do
            if git ls-files --error-unmatch "$f" 2>/dev/null; then
              echo "BLOCKED: $f is tracked — dev files must not enter the product repo"
              FAILED=1
            fi
          done
          # Check for dev directories
          for dir in "01 Daily" "plans" "kilo_logs" "kilo_output" ".compound-engineering" "test-results"; do
            if git ls-files | grep -q "^${dir}/"; then
              echo "BLOCKED: ${dir}/ contains tracked files — dev directories must not enter the product repo"
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "Run: git rm --cached <file> && git commit"
            exit 1
          fi
          echo "Clean — no dev files in tracked tree"
