name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"  # Semver only: v0.4.2, v1.0.0, v1.2.3

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for auto-generated release notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true  # Auto-generates from merged PR titles since last tag
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
