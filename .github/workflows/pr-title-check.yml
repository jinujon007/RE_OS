name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  validate-title:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types — aligned with CONTRIBUTING.md
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
            revert

          # Scopes are optional — don't require them for solo operator
          requireScope: false

          # Subject must start lowercase
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR title "{title}" — subject must begin with a lowercase letter.
            Example: "feat: yelahanka scraper — RERA AJAX intercept"

          # Allow WIP PRs (prefixed with WIP:) — they don't block merge, just signal intent
          wip: true

          # Don't require each commit to match — PR title is the squash commit message
          validateSingleCommit: false
