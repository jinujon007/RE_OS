name: Stale Issues

on:
  schedule:
    - cron: "0 12 * * 1"  # Mondays at noon UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  stale:
    name: Mark and Close Stale Issues
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues: stale after 30 days, closed after 7 more
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 30 days.
            If it's still relevant, leave a comment to keep it open.
            It will be closed in 7 days if there's no activity.
          close-issue-message: >
            Closing due to inactivity. Reopen if still relevant —
            include updated log output and `docker compose ps` status.

          # PRs: stale after 14 days, closed after 7 more
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has been inactive for 14 days.
            Rebase on master and push to keep it active.
            It will be closed in 7 days if there's no activity.
          close-pr-message: >
            Closing due to inactivity. Reopen with a rebase on current master.

          # Never mark these as stale
          exempt-issue-labels: "pinned,security,P0-critical,good-first-issue"
          exempt-pr-labels: "pinned,security"
