[tool.ruff]
target-version = "py311"
line-length = 100

exclude = [
    ".git",
    ".kilo",
    "kilo_output",
    "kilo_logs",
    "__pycache__",
    ".pytest_cache",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",   # line-too-long — handled by formatter
    "E741",   # ambiguous variable name (l, O, I) — too noisy in SQL-heavy code
    "F401",   # unused-import — some imports are side-effect-only
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811"]           # test fixtures re-import intentionally
"database/*" = ["ALL"]                 # SQL files — ruff skips by extension anyway
"utils/diagnose.py" = ["E402"]        # diagnostic script — sys.path patch before imports is intentional
"utils/status.py" = ["E402"]          # standalone script — sys.path patch before imports is intentional

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
