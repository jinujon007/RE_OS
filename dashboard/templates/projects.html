<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>Projects — LLS Intelligence Operations</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e1a; color: #c9d1d9;
  font-family: 'Courier New', Courier, monospace;
  font-size: 14px; min-height: 100vh; padding: 20px;
}
h1 { color: #f0a020; font-size: 18px; margin-bottom: 16px; letter-spacing: 1px; }
h2 { color: #f0a020; font-size: 14px; margin-bottom: 10px; }
h3 { color: #58a6ff; font-size: 13px; margin-bottom: 6px; }
.panel { background: #0f1520; border: 1px solid #2a3a55; padding: 16px; margin-bottom: 16px; max-width: 1400px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: flex-end; }

.stat-card {
  background: #0f1520; border: 1px solid #2a3a55; padding: 12px 16px;
  min-width: 140px; flex: 1;
}
.stat-card .value { font-size: 22px; color: #58a6ff; }
.stat-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }

.kanban { display: flex; gap: 10px; overflow-x: auto; min-height: 300px; }
.kanban-col {
  flex: 1; min-width: 180px; background: #0a0e1a; border: 1px solid #2a3a55;
  padding: 10px; border-radius: 0;
}
.kanban-col h3 { font-size: 12px; margin-bottom: 8px; color: #f0a020; text-align: center; }
.project-card {
  background: #0f1520; border: 1px solid #30363d; padding: 8px; margin-bottom: 8px; cursor: pointer;
}
.project-card:hover { border-color: #58a6ff; }
.project-card .market { font-size: 10px; color: #8b949e; }
.project-card .survey { font-size: 12px; color: #c9d1d9; }
.project-card .tasks { font-size: 10px; color: #58a6ff; }
.days-green { color: #3fb950; } .days-amber { color: #d29922; } .days-red { color: #f85149; }
.tag {
  display: inline-block; padding: 2px 6px; font-size: 10px; margin: 2px;
  border: 1px solid #30363d;
}
.tag-blue { border-color: #58a6ff; color: #58a6ff; }
.tag-amber { border-color: #d29922; color: #d29922; }
.tag-green { border-color: #3fb950; color: #3fb950; }

.btn {
  background: #0f1520; border: 1px solid #2a3a55; color: #c9d1d9;
  padding: 8px 16px; cursor: pointer; font-family: inherit; font-size: 13px;
}
.btn:hover { border-color: #58a6ff; }
.btn-amber { border-color: #d29922; color: #d29922; }
.btn-amber:hover { background: #d29922; color: #0a0e1a; }

select, input {
  background: #0a0e1a; border: 1px solid #2a3a55; color: #c9d1d9;
  padding: 6px 10px; font-family: inherit; font-size: 13px;
}
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 100;
}
.modal {
  background: #0f1520; border: 1px solid #2a3a55; padding: 20px;
  max-width: 600px; margin: 60px auto; max-height: 80vh; overflow-y: auto;
}
.modal h3 { color: #f0a020; }
.modal-close { float: right; cursor: pointer; color: #8b949e; }
.modal-close:hover { color: #f85149; }
.task-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a2330; }
.task-row .status { font-size: 11px; }
</style>
</head>
<body>

<h1>⬡ PROJECTS — Operations Dashboard</h1>

<div class="panel" id="summary-header">
  <div class="row" id="stat-cards"></div>
</div>

<div class="row" style="max-width:1400px;">
  <button class="btn btn-amber" onclick="showNewProjectForm()">+ New Project</button>
  <select id="filter-market" onchange="loadProjects()">
    <option value="">All Markets</option>
    <option value="Yelahanka">Yelahanka</option>
    <option value="Devanahalli">Devanahalli</option>
    <option value="Hebbal">Hebbal</option>
  </select>
  <select id="filter-status" onchange="loadProjects()">
    <option value="">All Status</option>
    <option value="lead">Lead</option>
    <option value="mou">MOU</option>
    <option value="loi">LOI</option>
    <option value="signed">Signed</option>
    <option value="rera_applied">RERA Applied</option>
    <option value="construction">Construction</option>
    <option value="possession">Possession</option>
    <option value="delivered">Delivered</option>
  </select>
</div>

<div class="panel">
  <div class="kanban" id="kanban-board"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
const API = "";
const KANBAN_STAGES = ["lead","mou","loi","signed","rera_applied","construction","possession","delivered"];
const STAGE_LABELS = {"lead":"LEAD","mou":"MOU","loi":"LOI","signed":"SIGNED","rera_applied":"RERA","construction":"BUILD","possession":"POSSESS","delivered":"DONE"};
let _apiKey = localStorage.getItem("re_os_api_key") || "";

function getApiKey() {
  if (!_apiKey) { _apiKey = prompt("Enter API Key:") || ""; localStorage.setItem("re_os_api_key", _apiKey); }
  return _apiKey;
}

async function apiFetch(url, opts={}) {
  const headers = {"Content-Type":"application/json", "X-API-Key": getApiKey()};
  const resp = await fetch(API + url, {...opts, headers});
  if (resp.status === 401) {
    localStorage.removeItem("re_os_api_key"); _apiKey = "";
    alert("Unauthorized. Check API Key.");
    return null;
  }
  if (resp.status === 429) {
    alert("Rate limit reached. Wait and retry.");
    return null;
  }
  return resp.json();
}

async function loadProjects() {
  document.getElementById("kanban-board").innerHTML = '<div style="color:#8b949e;text-align:center;padding:40px">Loading...</div>';
  const market = document.getElementById("filter-market").value;
  const status = document.getElementById("filter-status").value;
  let url = "/api/projects?per_page=200&";
  if (market) url += "market=" + encodeURIComponent(market) + "&";
  if (status) url += "status=" + encodeURIComponent(status) + "&";
  const data = await apiFetch(url);
  if (!data) { document.getElementById("kanban-board").innerHTML = '<div style="color:#f85149;text-align:center;padding:40px">Failed to load projects</div>'; return; }
  const projects = Array.isArray(data) ? data : (data.projects || []);
  renderKanban(projects);
}

function daysColor(days) {
  if (days <= 30) return "days-green";
  if (days <= 60) return "days-amber";
  return "days-red";
}

function renderKanban(projects) {
  const board = document.getElementById("kanban-board");
  board.innerHTML = "";
  const cols = {};
  KANBAN_STAGES.forEach(s => cols[s] = []);
  projects.forEach(p => {
    const st = p.status || "lead";
    if (cols[st]) cols[st].push(p);
  });
  KANBAN_STAGES.forEach(stage => {
    const col = document.createElement("div");
    col.className = "kanban-col";
    col.innerHTML = `<h3>${STAGE_LABELS[stage]||stage.toUpperCase()} (${cols[stage].length})</h3>`;
    cols[stage].forEach(p => {
      const days = p.days_in_stage || 0;
      const card = document.createElement("div");
      card.className = "project-card";
      card.onclick = () => showProjectDetail(p.id);
      card.innerHTML = `
        <div class="market">${p.market||""}</div>
        <div class="survey">${p.survey_no||p.name||"?"}</div>
        <div class="tasks">${p.open_task_count||0} tasks · <span class="${daysColor(days)}">${days}d</span></div>
      `;
      col.appendChild(card);
    });
    board.appendChild(col);
  });
  renderStats(projects);
}

function renderStats(projects) {
  const total = projects.length;
  const openTasks = projects.reduce((s, p) => s + (p.open_task_count || 0), 0);
  const loiPlus = projects.filter(p => ["loi","signed","construction","possession"].includes(p.status)).length;
  const avgDays = projects.length ? Math.round(projects.reduce((s, p) => s + (p.days_in_stage || 0), 0) / projects.length) : 0;
  document.getElementById("stat-cards").innerHTML = `
    <div class="stat-card"><div class="value">${total}</div><div class="label">Active Projects</div></div>
    <div class="stat-card"><div class="value">${openTasks}</div><div class="label">Open Tasks</div></div>
    <div class="stat-card"><div class="value">${loiPlus}</div><div class="label">At LOI+</div></div>
    <div class="stat-card"><div class="value">${avgDays}</div><div class="label">Avg Days/Stage</div></div>
  `;
}

async function showProjectDetail(id) {
  const data = await apiFetch("/api/projects/" + id);
  const p = data.project || data;
  const tasks = data.tasks || [];
  const vel = data.velocity || {};
  let tasksHtml = tasks.map(t => `
    <div class="task-row">
      <span>${t.title||""}</span>
      <span class="status">${t.status||""}${t.due_date ? ' · due '+t.due_date : ''}</span>
    </div>
  `).join("") || "<div style='color:#8b949e'>No tasks</div>";

  document.getElementById("modal-content").innerHTML = `
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h3>${p.name||"Project"} · ${p.survey_no||""}</h3>
    <p style="margin:8px 0;color:#8b949e">${p.market||""} · ${p.status||""} · ${p.days_in_stage||0}d in stage</p>
    <div style="margin:12px 0">
      <button class="btn" onclick="updateStatus('${id}','mou')">→ MOU</button>
      <button class="btn" onclick="updateStatus('${id}','loi')">→ LOI</button>
      <button class="btn" onclick="updateStatus('${id}','signed')">→ Signed</button>
    </div>
    <h3>Tasks</h3>
    <div style="margin:8px 0">${tasksHtml}</div>
    <div style="margin:12px 0">
      <input id="new-task-title" placeholder="New task title..." style="width:70%">
      <button class="btn btn-amber" onclick="addTask('${id}')">Add</button>
    </div>
    <h3>Deal Velocity</h3>
    <div style="color:#8b949e;font-size:12px;margin-top:6px">
      Current stage: ${vel.current_stage||"?"} · ${vel.current_stage_days||0}d<br>
      ${(vel.stages||[]).map(s => `${s.from_status||"start"} → ${s.to_status||""}: ${s.days_elapsed||0}d`).join("<br>")}
    </div>
  `;
  document.getElementById("modal-overlay").style.display = "block";
}

async function updateStatus(id, status) {
  if (!confirm("Change project status to " + status.toUpperCase() + "?")) return;
  await apiFetch("/api/projects/" + id + "/status", {
    method: "PATCH",
    body: JSON.stringify({status})
  });
  loadProjects();
  closeModal();
}

async function addTask(id) {
  const title = document.getElementById("new-task-title").value.trim();
  if (!title) return;
  await apiFetch("/api/projects/" + id + "/tasks", {
    method: "POST",
    body: JSON.stringify({title, dept: "ops"})
  });
  document.getElementById("new-task-title").value = "";
  showProjectDetail(id);
}

function showNewProjectForm() {
  document.getElementById("modal-content").innerHTML = `
    <span class="modal-close" onclick="closeModal()">✕</span>
    <h3>New Project</h3>
    <div style="margin:12px 0">
      <div class="field-group">
        <label>Name:</label><input id="np-name" style="width:100%"><br>
        <label>Market:</label>
        <select id="np-market">
          <option value="Yelahanka">Yelahanka</option>
          <option value="Devanahalli">Devanahalli</option>
          <option value="Hebbal">Hebbal</option>
        </select><br>
        <label>Survey No:</label><input id="np-survey" style="width:100%"><br>
        <label>Deal Type:</label>
        <select id="np-deal-type">
          <option value="compare">Compare</option>
          <option value="outright">Outright</option>
          <option value="jd">Joint Development</option>
        </select><br>
        <label>Notes:</label><textarea id="np-notes" style="width:100%;background:#0a0e1a;border:1px solid #2a3a55;color:#c9d1d9;padding:6px;font-family:inherit"></textarea><br><br>
        <button class="btn btn-amber" onclick="createProject()">Create</button>
      </div>
    </div>
  `;
  document.getElementById("modal-overlay").style.display = "block";
}

async function createProject() {
  const name = document.getElementById("np-name").value.trim() || "New Project";
  const market = document.getElementById("np-market").value;
  const survey = document.getElementById("np-survey").value.trim();
  const dealType = document.getElementById("np-deal-type").value;
  const notes = document.getElementById("np-notes").value.trim();
  await apiFetch("/api/projects", {
    method: "POST",
    body: JSON.stringify({name, market, survey_no: survey, deal_type: dealType, notes})
  });
  closeModal();
  loadProjects();
}

function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

document.addEventListener("DOMContentLoaded", loadProjects);
</script>
</body>
</html>
