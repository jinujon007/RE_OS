<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
<title>Agent Memory Explorer — LLS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e1a; color: #c9d1d9;
  font-family: 'Courier New', Courier, monospace; font-size: 14px;
  min-height: 100vh; padding: 20px;
}
h1 { color: #58a6ff; font-size: 18px; margin-bottom: 4px; letter-spacing: 1px; }
.subtitle { color: #6b7280; font-size: 11px; margin-bottom: 20px; }
.panel {
  background: #0f1520; border: 1px solid #2a3a55;
  padding: 16px; margin-bottom: 16px; max-width: 1400px;
}
.filter-bar {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  margin-bottom: 20px;
}
.filter-group {
  display: flex; flex-direction: column; gap: 4px;
}
.filter-group label {
  font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px;
}
.filter-group select, .filter-group input {
  background: #0a0e1a; border: 1px solid #2a3a55; color: #c9d1d9;
  padding: 6px 8px; font-family: 'Courier New', monospace; font-size: 12px;
  border-radius: 4px; min-width: 120px;
}
.filter-group select:focus, .filter-group input:focus { outline: none; border-color: #58a6ff; }
.filter-group input[type=range] { min-width: 100px; padding: 0; }
.range-value { color: #58a6ff; font-size: 11px; font-weight: bold; }
.stats-row {
  display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;
}
.stat-card {
  background: #161b2e; border: 1px solid #2a3a55;
  padding: 12px 16px; min-width: 120px;
}
.stat-card .label { font-size: 9px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
.stat-card .value { font-size: 18px; color: #f0a020; margin-top: 2px; }
.stat-card .value.green { color: #3fb950; }
.stat-card .value.red { color: #f85149; }
.stat-card .value.amber { color: #f0a020; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 8px 12px; border-bottom: 1px solid #2a3a55;
  color: #8b949e; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  position: sticky; top: 0; background: #0f1520; z-index: 1;
}
td {
  padding: 8px 12px; border-bottom: 1px solid #1a2540; font-size: 12px;
  max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
tr:hover td { background: #1a2540; }
tr.conflict-row td { background: #2a1f0f; }
tr.conflict-row:hover td { background: #3a2a1a; }
.confidence-badge {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 11px; font-weight: bold;
}
.confidence-badge.high { background: #0f2a0f; color: #3fb950; }
.confidence-badge.medium { background: #2a1f0f; color: #f0a020; }
.confidence-badge.low { background: #2a0f0f; color: #f85149; }
.pagination {
  display: flex; gap: 8px; align-items: center; justify-content: center;
  margin-top: 16px;
}
.pagination button {
  background: #161b2e; border: 1px solid #2a3a55; color: #c9d1d9;
  padding: 6px 12px; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 4px;
}
.pagination button:hover { background: #1a2540; border-color: #58a6ff; }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination .page-info { color: #8b949e; font-size: 11px; }
.spinner { display: none; color: #8b949e; font-size: 13px; padding: 20px; text-align: center; }
.spinner.active { display: block; }
.error-msg { color: #f85149; font-size: 12px; padding: 16px; text-align: center; }
.error-msg button { background: #3a1a1a; border: 1px solid #f85149; color: #f85149; padding: 4px 12px; font-family: inherit; font-size: 11px; cursor: pointer; border-radius: 4px; margin-top: 8px; }
.error-msg button:hover { background: #4a2a2a; }
.empty-msg { color: #484f58; font-size: 12px; padding: 20px; text-align: center; font-style: italic; }
.auto-refresh-toggle {
  font-size: 10px; color: #6b7280; cursor: pointer; user-select: none;
  display: inline-flex; align-items: center; gap: 6px; margin-left: 16px;
}
.auto-refresh-toggle.active { color: #3fb950; }
.auto-refresh-toggle::before { content: '⟳'; font-size: 12px; }
.toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.conflict-badge-nav {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 12px;
  font-size: 10px; font-weight: bold; cursor: pointer;
  background: #3a2a1a; color: #f0a020; border: 1px solid #f0a020;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a3a55; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a5a85; }
</style>
</head>
<body>

<h1>AGENT MEMORY EXPLORER</h1>
<div class="subtitle" id="last-updated">Loading...</div>

<div class="toolbar">
  <button id="refresh-btn" style="background:#161b2e;border:1px solid #2a3a55;color:#8b949e;padding:6px 12px;font-family:inherit;font-size:11px;cursor:pointer;border-radius:4px;" title="Refresh now">⟳ Refresh</button>
  <label class="auto-refresh-toggle active" id="auto-refresh-label">
    <input type="checkbox" id="auto-refresh-checkbox" checked style="display:none;">
    Auto-refresh (30s)
  </label>
</div>

<div class="panel">
  <div class="filter-bar">
    <div class="filter-group">
      <label for="market-filter">Market</label>
      <select id="market-filter">
        <option value="">All Markets</option>
        <option value="Yelahanka">Yelahanka</option>
        <option value="Devanahalli">Devanahalli</option>
        <option value="Hebbal">Hebbal</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="agent-filter">Agent</label>
      <select id="agent-filter">
        <option value="">All Agents</option>
        <option value="ceo">CEO</option>
        <option value="analyst">Analyst</option>
        <option value="scraper">Scout</option>
        <option value="bd_head">BD Head</option>
        <option value="finance_head">Finance Head</option>
        <option value="legal_head">Legal Head</option>
        <option value="_memory_system_">Conflict Detector</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="confidence-filter">Min Confidence <span class="range-value" id="confidence-label">0.5</span></label>
      <input id="confidence-filter" type="range" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div class="filter-group">
      <label for="days-filter">Days</label>
      <select id="days-filter">
        <option value="7">7 days</option>
        <option value="30" selected>30 days</option>
        <option value="90">90 days</option>
        <option value="365">365 days</option>
      </select>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Total Memories</div>
      <div class="value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg Confidence</div>
      <div class="value" id="stat-avg-conf">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Conflicts</div>
      <div class="value" id="stat-conflicts">—</div>
    </div>
  </div>

  <div style="max-height:400px;overflow-y:auto;border:1px solid #1a2540;border-radius:4px;">
    <table id="memory-table">
      <thead>
        <tr>
          <th>Agent</th>
          <th>Market</th>
          <th>Fact</th>
          <th style="text-align:center;">Confidence</th>
          <th style="text-align:center;">Sources</th>
          <th>Last Updated</th>
        </tr>
      </thead>
      <tbody id="memory-tbody">
        <tr><td colspan="6" class="empty-msg">Adjust filters and load memories</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination-controls" style="display:none;">
    <button id="prev-page" disabled>← Prev</button>
    <span class="page-info" id="page-info">Page 1</span>
    <button id="next-page">Next →</button>
  </div>
</div>

<div class="spinner" id="spinner">⟳ Loading memories...</div>
<div class="error-msg" id="error-msg" style="display:none;"></div>

<script>
"use strict";

let currentPage = 1;
let totalMemories = 0;
let conflictTotal = 0;
const PER_PAGE = 20;
let debounceTimer = null;
let autoRefreshTimer = null;
const AUTO_REFRESH_MS = 30000;

// ── URL state (bookmarkable filters) ──
function updateUrlState() {
  const params = new URLSearchParams();
  const m = document.getElementById('market-filter').value; if (m) params.set('m', m);
  const a = document.getElementById('agent-filter').value; if (a) params.set('a', a);
  const c = document.getElementById('confidence-filter').value; if (c !== '0.5') params.set('c', c);
  const d = document.getElementById('days-filter').value; if (d !== '30') params.set('d', d);
  const p = currentPage; if (p > 1) params.set('p', p);
  const qs = params.toString();
  history.replaceState(null, '', qs ? '/memory?' + qs : '/memory');
}

function restoreUrlState() {
  try {
    const params = new URLSearchParams(window.location.search);
    if (params.has('m')) { document.getElementById('market-filter').value = params.get('m'); }
    if (params.has('a')) { document.getElementById('agent-filter').value = params.get('a'); }
    if (params.has('c')) { document.getElementById('confidence-filter').value = params.get('c'); document.getElementById('confidence-label').textContent = parseFloat(params.get('c')).toFixed(1); }
    if (params.has('d')) { document.getElementById('days-filter').value = params.get('d'); }
    if (params.has('p')) { currentPage = parseInt(params.get('p'), 10) || 1; }
  } catch (e) { /* ignore invalid URL state */ }
}

// ── Auto-refresh ──
function startAutoRefresh() {
  stopAutoRefresh();
  if (document.getElementById('auto-refresh-checkbox').checked) {
    autoRefreshTimer = setInterval(function() { loadMemories(); }, AUTO_REFRESH_MS);
  }
}
function stopAutoRefresh() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
}
function toggleAutoRefresh() {
  const active = document.getElementById('auto-refresh-checkbox').checked;
  document.getElementById('auto-refresh-label').className = 'auto-refresh-toggle' + (active ? ' active' : '');
  if (active) { startAutoRefresh(); } else { stopAutoRefresh(); }
}

const SKELETON_HTML = Array.from({length: 5}, () =>
  '<tr><td style="padding:8px 12px;color:#2a3a55;" colspan="6">⟳ Loading memory data…</td></tr>'
).join('');

document.addEventListener('DOMContentLoaded', function() {
  const confSlider = document.getElementById('confidence-filter');
  confSlider.addEventListener('input', function() {
    document.getElementById('confidence-label').textContent = parseFloat(this.value).toFixed(1);
  });

  ['market-filter', 'agent-filter', 'confidence-filter', 'days-filter'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('change', function() {
      currentPage = 1;
      updateUrlState();
      debounceLoad();
    });
    if (id === 'confidence-filter') {
      el.addEventListener('input', function() {
        document.getElementById('confidence-label').textContent = parseFloat(this.value).toFixed(1);
        currentPage = 1;
        updateUrlState();
        debounceLoad();
      });
    }
  });

  document.getElementById('prev-page').addEventListener('click', function() { changePage(-1); });
  document.getElementById('next-page').addEventListener('click', function() { changePage(1); });
  document.getElementById('refresh-btn').addEventListener('click', function() { loadMemories(); });
  document.getElementById('auto-refresh-checkbox').addEventListener('change', function() { toggleAutoRefresh(); });

  // Keyboard: Escape dismisses error
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.getElementById('error-msg').style.display = 'none';
    }
  });

  restoreUrlState();
  loadMemories();
  startAutoRefresh();
});

function debounceLoad() {
  if (debounceTimer) clearTimeout(debounceTimer);
  debounceTimer = setTimeout(loadMemories, 300);
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  })[ch]);
}

async function loadMemories() {
  const tbody = document.getElementById('memory-tbody');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('error-msg');

  spinner.classList.add('active');
  errorMsg.style.display = 'none';
  tbody.innerHTML = SKELETON_HTML;

  const market = document.getElementById('market-filter').value;
  const agent = document.getElementById('agent-filter').value;
  const confidence = document.getElementById('confidence-filter').value;
  const days = document.getElementById('days-filter').value;

  const params = new URLSearchParams();
  params.set('page', currentPage);
  params.set('per_page', PER_PAGE);
  params.set('min_confidence', confidence);
  params.set('days', days);
  if (market) params.set('market', market);
  if (agent) params.set('agent_id', agent);

  // Fetch global conflict count in parallel
  const conflictPromise = fetch('/api/memory/conflict-count')
    .then(r => r.json())
    .then(d => d.unresolved_conflicts || 0)
    .catch(() => 0);

  try {
    const resp = await fetch('/api/memory/explorer?' + params.toString());
    spinner.classList.remove('active');
    if (!resp.ok) {
      const status = resp.status;
      errorMsg.innerHTML = 'Failed to load memories (HTTP ' + status + ')<br><button onclick="loadMemories()">Retry</button>';
      errorMsg.style.display = 'block';
      tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">Error loading data</td></tr>';
      return;
    }

    const data = await resp.json();
    const memories = data.memories || [];
    totalMemories = data.total || 0;
    conflictTotal = await conflictPromise;

    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleString('en-IN', { hour12: false });

    if (!memories.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No memories found for current filters</td></tr>';
      updateStats(0, 0, conflictTotal);
      return;
    }

    let totalConf = 0;

    tbody.innerHTML = memories.map(m => {
      try {
        const conf = parseFloat(m.confidence || 0);
        totalConf += conf;
        const isConflict = (m.fact || '').toLowerCase().includes('conflict');

        let confClass = 'low';
        if (conf >= 0.8) confClass = 'high';
        else if (conf >= 0.5) confClass = 'medium';

        const factText = m.fact || '';
        const truncated = factText.length > 120
          ? escapeHtml(factText.slice(0, 120)) + '\u2026'
          : escapeHtml(factText);

        const ts = m.last_updated
          ? new Date(m.last_updated).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false })
          : '\u2014';

        const rowClass = isConflict ? ' class="conflict-row"' : '';
        const agentDisplay = escapeHtml(m.agent_id || '\u2014');
        const marketDisplay = escapeHtml(m.market || '\u2014');
        const confDisplay = conf.toFixed(2);

        return '<tr' + rowClass + '>'
          + '<td style="color:#c9d1d9;">' + agentDisplay + '</td>'
          + '<td style="color:#8b949e;">' + marketDisplay + '</td>'
          + '<td title="' + escapeHtml(factText) + '" style="color:#c9d1d9;">' + truncated + '</td>'
          + '<td style="text-align:center;"><span class="confidence-badge ' + confClass + '">' + confDisplay + '</span></td>'
          + '<td style="text-align:center;color:#6b7280;">' + (m.source_count || 0) + '</td>'
          + '<td style="color:#6b7280;">' + ts + '</td>'
          + '</tr>';
      } catch (rowErr) {
        return '<tr><td colspan="6" style="color:#f85149;padding:8px 12px;">Error rendering memory: ' + escapeHtml(rowErr.message) + '</td></tr>';
      }
    }).join('');

    const avgConf = memories.length > 0 ? (totalConf / memories.length) : 0;
    updateStats(totalMemories, avgConf, conflictTotal);
    updatePagination();
  } catch (e) {
    spinner.classList.remove('active');
    errorMsg.innerHTML = 'Network error: ' + escapeHtml(e.message) + '<br><button onclick="loadMemories()">Retry</button>';
    errorMsg.style.display = 'block';
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">Failed to load</td></tr>';
  }
}

function updateStats(total, avgConf, conflictCount) {
  document.getElementById('stat-total').textContent = total;
  const avgEl = document.getElementById('stat-avg-conf');
  avgEl.textContent = avgConf ? avgConf.toFixed(2) : '0.00';
  avgEl.className = 'value' + (avgConf >= 0.8 ? ' green' : avgConf >= 0.5 ? ' amber' : '');

  const confEl = document.getElementById('stat-conflicts');
  confEl.textContent = conflictCount;
  confEl.className = 'value' + (conflictCount > 0 ? ' red' : ' green');
}

function updatePagination() {
  const totalPages = Math.max(1, Math.ceil(totalMemories / PER_PAGE));
  const controls = document.getElementById('pagination-controls');
  const pageInfo = document.getElementById('page-info');
  const prevBtn = document.getElementById('prev-page');
  const nextBtn = document.getElementById('next-page');

  if (totalPages <= 1) {
    controls.style.display = 'none';
    return;
  }

  controls.style.display = 'flex';
  pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages + ' (' + totalMemories + ' total)';
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
}

function changePage(delta) {
  const totalPages = Math.max(1, Math.ceil(totalMemories / PER_PAGE));
  const newPage = Math.max(1, Math.min(currentPage + delta, totalPages));
  if (newPage === currentPage) return;
  currentPage = newPage;
  loadMemories();
}
</script>
</body>
</html>
