<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>V2.0 Readiness — LLS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e1a; color: #c9d1d9;
  font-family: 'Courier New', Courier, monospace; font-size: 14px;
  min-height: 100vh; padding: 20px;
}
h1 { color: #58a6ff; font-size: 18px; margin-bottom: 4px; letter-spacing: 1px; }
.subtitle { color: #6b7280; font-size: 11px; margin-bottom: 20px; }
.panel {
  background: #0f1520; border: 1px solid #2a3a55;
  padding: 16px; margin-bottom: 16px; max-width: 1400px;
}
.panel h2 { color: #f0a020; font-size: 14px; margin-bottom: 12px; }
.v2-status {
  font-size: 24px; font-weight: bold; padding: 20px; text-align: center;
  border-radius: 6px; margin-bottom: 16px;
}
.v2-status.live { background: #0f2a0f; color: #3fb950; border: 2px solid #3fb950; }
.v2-status.validating { background: #2a1f0f; color: #f0a020; border: 2px solid #f0a020; }
.metric-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px; margin-bottom: 16px;
}
.metric-card {
  background: #1a2235; border: 1px solid #2a3a55;
  border-radius: 6px; padding: 16px; text-align: center;
}
.metric-card .label { color: #8b949e; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.metric-card .value { font-size: 28px; font-weight: bold; color: #c9d1d9; }
.metric-card .value.green { color: #3fb950; }
.metric-card .value.amber { color: #f0a020; }
.metric-card .value.red { color: #f85149; }
.progress-bar {
  height: 20px; border-radius: 3px; overflow: hidden;
  background: #1a2540; margin: 8px 0; width: 100%;
}
.progress-fill {
  height: 100%; transition: width 0.3s ease;
}
.progress-fill.green { background: #3fb950; }
.progress-fill.amber { background: #f0a020; }
.progress-fill.red { background: #f85149; }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 11px; font-weight: bold;
}
.badge.green { background: #0f2a0f; color: #3fb950; }
.badge.amber { background: #2a1f0f; color: #f0a020; }
.badge.red { background: #2a0f0f; color: #f85149; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 8px 12px; border-bottom: 1px solid #2a3a55;
  color: #8b949e; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  position: sticky; top: 0; background: #0f1520; z-index: 1;
}
td { padding: 8px 12px; border-bottom: 1px solid #1a2540; font-size: 12px; }
tr:hover td { background: #1a2540; }
.declare-btn {
  display: block; width: 100%; max-width: 300px; margin: 20px auto;
  padding: 12px 24px; font-family: 'Courier New', Courier, monospace;
  font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;
  transition: all 0.2s; text-align: center;
}
.declare-btn.enabled { background: #3fb950; color: #0a0e1a; border: 2px solid #3fb950; }
.declare-btn.enabled:hover { background: #4fd960; box-shadow: 0 0 20px #3fb95060; }
.declare-btn.disabled { background: #1a2235; color: #484f58; border: 2px solid #2a3a55; cursor: not-allowed; }
.declare-result { text-align: center; font-size: 12px; margin-top: 8px; }
.declare-result.success { color: #3fb950; }
.declare-result.error { color: #f85149; }
.checklist { margin-top: 12px; }
.checklist-item {
  display: flex; align-items: center; gap: 12px; padding: 8px 0;
  border-bottom: 1px solid #1a2540; font-size: 12px;
}
.checklist-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.checklist-item .label { color: #c9d1d9; }
.checklist-item .label.done { text-decoration: line-through; color: #6b7280; }
.last-updated { color: #6b7280; font-size: 10px; margin-top: 12px; }
@keyframes pulse-skeleton {
  0% { opacity: 0.3; }
  50% { opacity: 0.6; }
  100% { opacity: 0.3; }
}
.skeleton .metric-card .value {
  display: inline-block; min-width: 60px; height: 28px;
  background: #1a2540; border-radius: 3px;
  animation: pulse-skeleton 1.5s ease-in-out infinite;
}
.skeleton .metric-card .progress-bar .progress-fill {
  animation: pulse-skeleton 1.5s ease-in-out infinite;
}
</style>
</head>
<body>
<h1># V2.0 Operations Readiness</h1>
<p class="subtitle">Live metrics proving RE_OS runs unattended — <span id="last-updated">loading...</span></p>

<div id="v2-status-header" class="v2-status validating">⏳ LOADING...</div>

<div class="metric-grid skeleton" id="metric-grid">
  <div class="metric-card">
    <div class="label">Scheduler Days Running</div>
    <div class="value" id="metric-days">—</div>
  </div>
  <div class="metric-card">
    <div class="label">Scheduler Success Rate</div>
    <div class="progress-bar" id="metric-rate-bar"><div class="progress-fill amber" style="width: 0%" id="metric-rate-fill"></div></div>
    <div class="value" id="metric-rate">—</div>
  </div>
  <div class="metric-card">
    <div class="label">Weekly Digests Delivered</div>
    <div class="value" id="metric-digests">—</div>
  </div>
  <div class="metric-card">
    <div class="label">Live RERA Growing</div>
    <div class="value" id="metric-growth">—</div>
  </div>
  <div class="metric-card">
    <div class="label">Board Room Avg Response</div>
    <div class="value" id="metric-br-response">—</div>
  </div>
</div>

<div class="panel">
  <h2>J-List Checklist</h2>
  <p class="subtitle" style="margin-bottom:8px">Manually track Jinu's validation steps</p>
  <div class="checklist" id="jlist">
    <div class="checklist-item"><input type="checkbox" id="j1"><label for="j1" class="label">J-1: Docker containers all Up (healthy)</label></div>
    <div class="checklist-item"><input type="checkbox" id="j2"><label for="j2" class="label">J-2: Full pipeline runs, no P0 errors</label></div>
    <div class="checklist-item"><input type="checkbox" id="j3"><label for="j3" class="label">J-3: Board Room pitch responds with 5 dept keys</label></div>
    <div class="checklist-item"><input type="checkbox" id="j4"><label for="j4" class="label">J-4: Evaluate returns board_session + deal_memo + investor_brief</label></div>
    <div class="checklist-item"><input type="checkbox" id="j5"><label for="j5" class="label">J-5: Backup status=ok, dump ≥1MB</label></div>
    <div class="checklist-item"><input type="checkbox" id="j6"><label for="j6" class="label">J-6: 48h unattended — no P0 errors, scheduler fires</label></div>
    <div class="checklist-item"><input type="checkbox" id="j7"><label for="j7" class="label">J-7: /api/ops/v2-readiness returns v2_ready=true</label></div>
  </div>
</div>

<button class="declare-btn disabled" id="declare-btn" onclick="declareV2()">DECLARE V2.0</button>
<div id="declare-result"></div>

<script>
const LS_KEY = 're_os_v2_jlist';

function saveChecklist() {
  const state = {};
  for (let i = 1; i <= 7; i++) {
    state[`j${i}`] = document.getElementById(`j${i}`).checked;
  }
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function loadChecklist() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    for (let i = 1; i <= 7; i++) {
      const cb = document.getElementById(`j${i}`);
      if (saved[`j${i}`]) {
        cb.checked = true;
        cb.nextElementSibling.classList.add('done');
      }
    }
  } catch (e) {}
}

document.querySelectorAll('#jlist input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    cb.nextElementSibling.classList.toggle('done', cb.checked);
  });
});

async function loadReadiness() {
  try {
    const resp = await fetch('/api/ops/v2-readiness');
    const data = await resp.json();
    renderMetrics(data);
  } catch (e) {
    document.getElementById('v2-status-header').className = 'v2-status validating';
    document.getElementById('v2-status-header').textContent = '⏳ CONNECTION ERROR';
  }
}

function renderMetrics(data) {
  document.getElementById('metric-grid').classList.remove('skeleton');
  const header = document.getElementById('v2-status-header');
  if (data.v2_ready) {
    header.className = 'v2-status live';
    header.textContent = '✅ V2.0 LIVE — All readiness criteria met';
    document.getElementById('declare-btn').className = 'declare-btn enabled';
    document.getElementById('declare-btn').disabled = false;
  } else {
    header.className = 'v2-status validating';
    header.textContent = '⏳ VALIDATING — System accumulating live data';
    document.getElementById('declare-btn').className = 'declare-btn disabled';
    document.getElementById('declare-btn').disabled = true;
  }

  document.getElementById('metric-days').textContent = data.scheduler_days_running + 'd';
  document.getElementById('metric-days').className = 'value ' + (data.scheduler_days_running >= 7 ? 'green' : 'amber');

  const rate = (data.scheduler_success_rate * 100).toFixed(0);
  document.getElementById('metric-rate').textContent = rate + '%';
  document.getElementById('metric-rate').className = 'value ' + (data.scheduler_success_rate >= 0.8 ? 'green' : 'amber');
  document.getElementById('metric-rate-fill').style.width = rate + '%';
  document.getElementById('metric-rate-fill').className = 'progress-fill ' + (data.scheduler_success_rate >= 0.8 ? 'green' : 'amber');

  document.getElementById('metric-digests').textContent = data.discord_digest_count;
  document.getElementById('metric-digests').className = 'value ' + (data.discord_digest_count >= 1 ? 'green' : 'amber');

  document.getElementById('metric-growth').textContent = data.live_rera_growth ? '✅ YES' : '❌ NO';
  document.getElementById('metric-growth').className = 'value ' + (data.live_rera_growth ? 'green' : 'red');

  const brVal = data.board_room_avg_response_s;
  if (brVal !== null) {
    document.getElementById('metric-br-response').textContent = brVal + 's';
    document.getElementById('metric-br-response').className = 'value ' + (brVal < 90 ? 'green' : 'amber');
  } else {
    document.getElementById('metric-br-response').textContent = 'N/A';
    document.getElementById('metric-br-response').className = 'value';
  }
}

async function declareV2() {
  const btn = document.getElementById('declare-btn');
  const resultEl = document.getElementById('declare-result');
  btn.disabled = true;
  btn.textContent = 'DECLARING...';
  try {
    const resp = await fetch('/api/ops/v2-declare', { method: 'POST' });
    const data = await resp.json();
    if (resp.ok) {
      resultEl.className = 'declare-result success';
      resultEl.textContent = '✅ V2.0 DECLARED on ' + data.date;
      btn.textContent = '✅ DECLARED';
    } else {
      resultEl.className = 'declare-result error';
      resultEl.textContent = '❌ ' + (data.error || 'Declaration failed');
      btn.className = 'declare-btn disabled';
      btn.textContent = 'DECLARE V2.0';
      btn.disabled = false;
    }
  } catch (e) {
    resultEl.className = 'declare-result error';
    resultEl.textContent = '❌ Network error';
    btn.className = 'declare-btn disabled';
    btn.textContent = 'DECLARE V2.0';
    btn.disabled = false;
  }
}

function updateTimestamp() {
  const now = new Date();
  const iso = now.toISOString().replace('T', ' ').replace(/\.\d+Z/, '+00:00');
  document.getElementById('last-updated').textContent = `Last updated: ${iso}`;
}

loadChecklist();
loadReadiness();
updateTimestamp();
setInterval(loadReadiness, 60000);
setInterval(updateTimestamp, 60000);
</script>
</body>
</html>
